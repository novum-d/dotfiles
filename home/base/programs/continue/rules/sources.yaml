policies:

  source_priority:
    - official
    - high_quality
    - community

  rules:
    - Prefer official documentation whenever available.
    - Use community sources only when official documentation is insufficient.
    - Prefer sources matching the current SDK/tool version.
    - Verify publication dates for rapidly changing technologies.
    - Avoid outdated Android BLE guidance prior to Android 12 unless explicitly needed.
    - Prefer modern Kotlin Flow/Coroutine guidance over deprecated patterns.
    - Prefer current Nix flakes documentation when applicable.